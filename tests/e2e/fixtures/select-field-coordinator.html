<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>SelectField coordinator fixture</title>
        <script type="module" src="./select-field-coordinator.harness.mjs"></script>
    </head>
    <body>
        <div
            id="immediate-coordinator"
            class="fff-select-field__shell"
            x-data="fffSelectFieldCoordinator({ patchConfig: { statePath: 'immediate.status' } })"
            x-init="init()"
        >
            <div data-fff-select-root x-data="immediateSelectInner()"></div>
        </div>

        <div
            id="delayed-coordinator"
            class="fff-select-field__shell"
            x-data="fffSelectFieldCoordinator({ patchConfig: { statePath: 'delayed.plan' } })"
            x-init="init()"
        >
            <div data-fff-select-root x-data="delayedSelectInner()"></div>
        </div>
    </body>
</html>
